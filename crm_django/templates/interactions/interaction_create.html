{% extends "general/layout.html" %}
{% load crispy_forms_tags %}

{% block head_title %}CRM - Añadir Interacción {% endblock %}


{% block page_content %}
    <h1 class="text-center text-3xl pt-4">Añadir Interacción</h1>
    <form action="" method="post" enctype="multipart/form-data" class="pt-4 mx-auto max-w-sm text-center">
        {% csrf_token %}
        <div class="row">
            <div class="col-12 col-sms-6">
                {{ form.contact_channel|as_crispy_field}}
                {{ form.content|as_crispy_field}}
            </div>
            <button class="w-[200px] cursor-pointer mt-4 inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white 
                bg-gray-900 rounded-lg hover:bg-gray-800 transition-colors duration-200 shadow-sm gap-2">Añadir Interacción</button>
        </div>
    </form>
{% endblock %}
