<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>CRM - Iniciar Sesión</title>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-xl">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white tracking-tight">CRM DJANGO</h1>
            <p class="text-sm text-gray-400 mt-2">Introduce tus credenciales para acceder al panel</p>
        </div>

        {% if form.errors %}
            <div class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-sm text-red-400 text-center">
                Usuario o contraseña incorrectos. Por favor, inténtalo de nuevo.
            </div>
        {% endif %}

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label for="id_username" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                    Usuario
                </label>
                <input 
                    type="text" 
                    name="username" 
                    id="id_username"
                    required
                    class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors text-sm"
                    placeholder="Tu nombre de usuario"
                >
            </div>

            <div>
                <label for="id_password" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">
                    Contraseña
                </label>
                <input 
                    type="password" 
                    name="password" 
                    id="id_password"
                    required
                    class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-colors text-sm"
                    placeholder="••••••••"
                >
            </div>

            <button 
                type="submit" 
                class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium rounded-xl transition-colors shadow-lg shadow-indigo-600/10 text-sm mt-2 cursor-pointer"
            >
                Entrar al sistema
            </button>
        </form>

    </div>

</body>
</html>
